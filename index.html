<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>

<!-- Per-device splash images: without these, iOS can fall back to a generic
     default canvas size (e.g. the iPhone X's 375x812pt) for the standalone
     home-screen app's native container, instead of sizing to the real
     device — leaving dead space CSS/JS can't see or reach. -->
<link rel="apple-touch-startup-image" href="/icon-512.png" media="(device-width: 320px) and (device-height: 568px)"/>
<link rel="apple-touch-startup-image" href="/icon-512.png" media="(device-width: 375px) and (device-height: 667px)"/>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;overflow-x:hidden}
body{font-family:"Montserrat",-apple-system,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
button{font-family:inherit;-webkit-tap-highlight-color:transparent}
input,select,textarea{font-family:inherit}
img{max-width:100%;display:block}

/* ── Accessibility: visible focus ring for keyboard users ── */
:focus{outline:none}
:focus-visible{outline:2px solid var(--accent,#d90b2c)!important;outline-offset:2px;border-radius:4px}
input:focus-visible,select:focus-visible,textarea:focus-visible{outline-offset:0;border-radius:var(--rs,8px)}
.composer-textarea:focus-visible{outline:none!important}

/* ── Skip to main content link ── */
.skip-link{position:absolute;top:-100px;left:8px;z-index:9999;padding:10px 18px;background:var(--accent,#d90b2c);color:#fff;border-radius:6px;font-weight:700;font-size:14px;text-decoration:none;transition:top 0.1s}
.skip-link:focus{top:8px}

/* ── Minimum touch target size (44×44px WCAG 2.5.5) ── */
/* Applied via padding wrapper on interactive elements, not min-height overrides
   to avoid layout breakage. nav buttons already have minHeight:44 in JSX. */

/* ── Clickable card hover feedback ── */
[data-clickable]:hover{background:var(--surface2)!important;cursor:pointer}
[data-clickable]{transition:background 0.12s,transform 0.1s}

/* ── Better scrollbar ── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2,rgba(255,255,255,0.15));border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:var(--text3,#888)}

/* ── Smooth page transitions ── */
.fade-in{animation:fadeIn 0.18s ease both}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ── Toast is announced by screen readers ── */
[role="status"]{aria-live:polite}
[role="alert"]{aria-live:assertive}
</style>
</head>
<body>
<a href="#main-content" class="skip-link">Skip to main content</a>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px"><img src="/favicon.svg" width="52" height="52" style="border-radius:14px"/><p style="font-size:18px;font-weight:700;color:#1a1a2e;font-family:sans-serif">Loading SocialFlow…</p></div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mammoth@1.7.0/mammoth.browser.min.js"></script>
<!-- html2pdf.js bundles jsPDF internally but doesn't expose it as a
     separate global — CV PDF generation needs jsPDF directly (writing
     real text, not screenshotting HTML via html2canvas), so load it on
     its own too. Exposes window.jspdf.jsPDF. -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<!-- Renders PDFs (CV viewer) ourselves via canvas instead of relying on the
     browser/OS's native PDF plugin inside an iframe — that plugin behaves
     inconsistently on mobile (fixed zoom cropping the page width, broken
     touch-scrolling for multi-page docs inside a nested iframe). Exposes
     window.pdfjsLib. -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>if(window.pdfjsLib){pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";}</script>
<script src="/app.js?v=662"></script>
</body>
</html>
